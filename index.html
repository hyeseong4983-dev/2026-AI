<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 스토리텔링 | 오혜성 포트폴리오</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700;900&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0a0a0c;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* 보랏빛 감성의 배경 애니메이션 */
        .bg-glow {
            background: radial-gradient(circle at 80% -20%, rgba(157, 80, 187, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at -20% 120%, rgba(0, 210, 255, 0.15) 0%, transparent 50%);
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
            filter: blur(60px);
        }

        .glass-nav {
            background: rgba(10, 10, 12, 0.6);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(12px);
        }

        /* 상단 우측 버튼 스타일링 */
        .btn-primary {
            background: linear-gradient(135deg, #9d50bb 0%, #6e48aa 100%);
            box-shadow: 0 4px 15px rgba(157, 80, 187, 0.3);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(157, 80, 187, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="custom-scroll">

    <!-- 배경 효과 -->
    <div class="bg-glow"></div>

    <!-- 네비게이션 바 -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center glass-nav">
        <!-- 왼쪽: 뒤로 가기 및 타이틀 -->
        <div class="flex items-center space-x-4">
            <a href="../portfolio.html" class="p-2 text-gray-400 hover:text-white hover:bg-white/10 rounded-full transition-all group">
                <svg class="w-6 h-6 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
            </a>
            <div class="text-lg font-black tracking-tighter italic text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 hidden md:block">
                ASSIGNMENT 02 : DATA STORYTELLING
            </div>
        </div>

        <!-- 오른쪽: 동영상 보기 & 스토리북 버튼 -->
        <div class="flex items-center space-x-3">
            <!-- 동영상 보기 버튼 (모달 열기 트리거) -->
            <button id="open-video-btn" class="btn-secondary flex items-center px-4 py-2.5 rounded-xl text-sm font-bold text-gray-200">
                <svg class="w-4 h-4 mr-2 text-cyan-400" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M2 6a2 2 0 012-2h12a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM10.414 10l-2.707-2.707A1 1 0 006 8v4a1 1 0 001.707.707L10.414 10zM12 8a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd" fill-rule="evenodd"></path>
                </svg>
                동영상 보기
            </button>
            
            <!-- 스토리북 버튼 (모달 열기 트리거) -->
            <button id="open-pdf-btn" class="btn-primary flex items-center px-5 py-2.5 rounded-xl text-sm font-bold text-white">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
                스토리북
            </button>
        </div>
    </nav>

    <!-- 메인 헤더 섹션 -->
    <header class="pt-40 pb-20 px-6 max-w-5xl mx-auto text-center" data-aos="fade-up">
        <div class="inline-block px-4 py-1.5 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-400 text-xs font-black tracking-widest uppercase mb-6">
            Gemini Storytelling Project
        </div>
        <h1 class="text-5xl md:text-7xl font-black mb-8 leading-tight">
            데이터에 숨겨진<br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">맥락과 서사를 발견하다</span>
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">
            Google Gemini를 활용하여 건조한 통계 수치를 대중이 공감할 수 있는 
            정책 스토리로 재구성한 실습 프로젝트입니다.
        </p>
    </header>

    <!-- 프로젝트 상세 컨텐츠 영역 -->
    <main class="max-w-5xl mx-auto px-6 pb-32" data-aos="fade-up" data-aos-delay="200">
        <div class="content-card p-12 text-center border-dashed border-white/20 min-h-[400px] flex flex-col items-center justify-center">
            <svg class="w-16 h-16 text-white/20 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
            </svg>
            <h3 class="text-2xl font-bold text-white/50 mb-2">프로젝트 세부 콘텐츠 영역</h3>
            <p class="text-white/30 text-sm">상단의 '동영상 보기' 또는 '스토리북' 버튼을 클릭하여 결과물 팝업을 확인하세요.</p>
        </div>
    </main>

    <footer class="py-8 text-center border-t border-white/5 text-white/30 text-xs font-mono tracking-widest">
        &copy; 2024 OH HYE SUNG // DATA STORYTELLING
    </footer>

    <!-- 비디오 팝업 (모달) -->
    <div id="video-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 hidden backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="relative w-full max-w-5xl px-4 md:px-8">
            <!-- 닫기 버튼 -->
            <button id="close-video-btn" class="absolute -top-12 right-4 md:right-8 text-white/70 hover:text-white transition-colors cursor-pointer">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            
            <!-- 비디오 플레이어 -->
            <div class="rounded-2xl overflow-hidden border border-white/10 shadow-2xl bg-black flex justify-center aspect-video">
                <video id="story-video" class="w-full h-full object-contain" controls>
                    <source src="./sunomv.mp4" type="video/mp4">
                    브라우저가 비디오 태그를 지원하지 않습니다.
                </video>
            </div>
        </div>
    </div>

    <!-- PDF 팝업 (모달) -->
    <div id="pdf-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 hidden backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="relative w-full max-w-6xl px-4 md:px-8 h-[90vh]">
            <!-- 닫기 버튼 -->
            <button id="close-pdf-btn" class="absolute -top-12 right-4 md:right-8 text-white/70 hover:text-white transition-colors cursor-pointer z-10">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            
            <!-- PDF 뷰어 -->
            <div class="rounded-2xl overflow-hidden border border-white/10 shadow-2xl bg-white flex justify-center h-full w-full">
                <!-- iframe을 사용하여 PDF 임베드 -->
                <iframe id="story-pdf" src="./04/부산의 파도를 넘어라_compressed.pdf" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </div>

    <script>
        // AOS 애니메이션 초기화
        AOS.init({
            duration: 1000,
            once: true,
            easing: 'ease-out-quad'
        });

        /* ======== 비디오 모달 제어 로직 ======== */
        const videoModal = document.getElementById('video-modal');
        const openVideoBtn = document.getElementById('open-video-btn');
        const closeVideoBtn = document.getElementById('close-video-btn');
        const storyVideo = document.getElementById('story-video');

        // 비디오 모달 열기
        openVideoBtn.addEventListener('click', (e) => {
            e.preventDefault();
            videoModal.classList.remove('hidden');
            setTimeout(() => {
                videoModal.classList.remove('opacity-0');
            }, 10);
            storyVideo.play();
        });

        // 비디오 모달 닫기
        const closeVideoModal = () => {
            videoModal.classList.add('opacity-0');
            storyVideo.pause(); 
            storyVideo.currentTime = 0; 
            setTimeout(() => {
                videoModal.classList.add('hidden');
            }, 300);
        };

        closeVideoBtn.addEventListener('click', closeVideoModal);
        videoModal.addEventListener('click', (e) => {
            if (e.target === videoModal) closeVideoModal();
        });


        /* ======== PDF 모달 제어 로직 ======== */
        const pdfModal = document.getElementById('pdf-modal');
        const openPdfBtn = document.getElementById('open-pdf-btn');
        const closePdfBtn = document.getElementById('close-pdf-btn');

        // PDF 모달 열기
        openPdfBtn.addEventListener('click', (e) => {
            e.preventDefault();
            pdfModal.classList.remove('hidden');
            setTimeout(() => {
                pdfModal.classList.remove('opacity-0');
            }, 10);
        });

        // PDF 모달 닫기
        const closePdfModal = () => {
            pdfModal.classList.add('opacity-0');
            setTimeout(() => {
                pdfModal.classList.add('hidden');
            }, 300);
        };

        closePdfBtn.addEventListener('click', closePdfModal);
        pdfModal.addEventListener('click', (e) => {
            if (e.target === pdfModal) closePdfModal();
        });
    </script>
</body>
</html>
